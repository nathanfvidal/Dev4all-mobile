<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Dev4all</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-body">
  <a href="/" class="auth-logo"><span>Dev4all</span></a>
  <div class="auth-circle auth-circle-1"></div>
  <div class="auth-circle auth-circle-2"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Bem-vindo de volta</h1>
      <p class="auth-subtitle">Entre na sua conta Dev4all</p>

      <div class="tab-switcher">
        <a href="/login.html" class="tab-btn active">Login</a>
        <a href="/registro.html" class="tab-btn">Registrar-se</a>
      </div>

      <form id="form-login">
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <div class="form-label-row">
            <label for="login-senha">Senha</label>
            <a href="/esqueci-senha.html" class="form-link">Esqueceu a senha?</a>
          </div>
          <input type="password" id="login-senha" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Entrar →</button>
        <div class="divider"><span>ou</span></div>
        <div class="social-buttons">
          <button type="button" class="btn-social">
            <i class="fa-brands fa-google social-icon"></i> Google
          </button>
          <button type="button" class="btn-social">
            <i class="fa-brands fa-github social-icon"></i> GitHub
          </button>
        </div>
        <p class="auth-footer-link">
          Não tem conta? <a href="/registro.html" class="form-link">Criar conta grátis</a>
        </p>
      </form>
    </div>
    <p class="auth-copyright">© 2026 Dev4all. Todos os direitos reservados.</p>
  </div>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
